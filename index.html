<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>물품 대여 신청</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root {
  --bg:#F7F8FA;--surface:#FFFFFF;--border:#E2E6EB;--primary:#2563EB;--primary-dark:#1D4ED8;
  --primary-light:#EFF6FF;--accent:#10B981;--accent-light:#ECFDF5;--warning:#F59E0B;
  --warning-light:#FFFBEB;--danger:#EF4444;--text-main:#111827;--text-sub:#6B7280;
  --text-hint:#9CA3AF;--radius:12px;--shadow:0 1px 4px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text-main);min-height:100vh;}
header{background:var(--primary);color:#fff;padding:28px 0 22px;text-align:center;}
header h1{font-size:1.55rem;font-weight:700;letter-spacing:-.5px;}
header p{font-size:.85rem;margin-top:6px;opacity:.85;}
.container{max-width:960px;margin:0 auto;padding:32px 20px 80px;}
.section-title{font-size:.72rem;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--text-sub);margin-bottom:14px;}
.section-sub{font-size:.78rem;color:var(--text-hint);margin-left:8px;font-weight:400;letter-spacing:0;text-transform:none;}
/* stock grid */
.stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:10px;}
.stock-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 14px 14px;display:flex;flex-direction:column;gap:6px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative;user-select:none;}
.stock-card:hover{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.stock-card.selected{border-color:var(--primary);background:var(--primary-light);box-shadow:0 0 0 3px rgba(37,99,235,.15);}
.stock-card.unavailable{opacity:.6;cursor:not-allowed;}
.stock-card.unavailable:hover{border-color:var(--border);box-shadow:none;}
.card-check{position:absolute;top:10px;right:10px;width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:all .15s;}
.stock-card.selected .card-check{background:var(--primary);border-color:var(--primary);color:#fff;}
.stock-name{font-size:.875rem;font-weight:600;padding-right:24px;}
.stock-count{font-size:1.35rem;font-weight:700;color:var(--primary);line-height:1;}
.stock-unit{font-size:.72rem;color:var(--text-sub);}
.card-qty-wrap{display:none;margin-top:4px;align-items:center;gap:6px;}
.stock-card.selected .card-qty-wrap{display:flex;}
.card-qty-label{font-size:.72rem;color:var(--text-sub);white-space:nowrap;}
.card-qty{width:64px;font-size:.9rem;font-family:inherit;padding:5px 8px;border:1.5px solid var(--primary);border-radius:6px;text-align:center;outline:none;background:#fff;color:var(--text-main);}
.card-qty:focus{box-shadow:0 0 0 3px rgba(37,99,235,.15);}
.badge{display:inline-block;font-size:.68rem;font-weight:600;padding:2px 8px;border-radius:20px;width:fit-content;}
.badge-ok{background:var(--accent-light);color:var(--accent);}
.badge-low{background:var(--warning-light);color:var(--warning);}
.badge-out{background:#FEF2F2;color:var(--danger);}

/* other card */
.other-card{background:var(--surface);border:1.5px dashed var(--border);border-radius:var(--radius);padding:16px 14px 14px;display:flex;flex-direction:column;gap:8px;}
.other-card-title{font-size:.8rem;font-weight:700;color:var(--text-sub);}
.other-card-sub{font-size:.72rem;color:var(--text-hint);margin-top:-4px;}
.other-card input{font-family:inherit;font-size:.875rem;padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;outline:none;color:var(--text-main);transition:border-color .15s,box-shadow .15s;width:100%;}
.other-card input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
.other-card input::placeholder{color:var(--text-hint);}

/* summary */
.selection-summary{background:var(--primary-light);border:1.5px solid #BFDBFE;border-radius:var(--radius);padding:12px 16px;font-size:.83rem;color:var(--primary-dark);margin-top:14px;margin-bottom:28px;min-height:42px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sel-chip{background:var(--primary);color:#fff;border-radius:20px;padding:3px 11px;font-size:.78rem;font-weight:600;}

/* form */
.form-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:32px 28px;box-shadow:var(--shadow);margin-bottom:36px;}
.form-title{font-size:1.05rem;font-weight:700;margin-bottom:24px;padding-bottom:16px;border-bottom:1.5px solid var(--border);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.form-grid .full{grid-column:1/-1;}
.field{display:flex;flex-direction:column;gap:6px;}
label{font-size:.8rem;font-weight:600;color:var(--text-sub);}
label .req{color:var(--danger);margin-left:2px;}
input[type=text],input[type=tel],input[type=datetime-local],textarea{font-family:inherit;font-size:.925rem;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text-main);transition:border-color .15s,box-shadow .15s;outline:none;width:100%;}
input[type=text]:focus,input[type=tel]:focus,input[type=datetime-local]:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
input::placeholder,textarea::placeholder{color:var(--text-hint);}
textarea{resize:vertical;min-height:80px;}
.date-note{font-size:.72rem;color:var(--text-hint);margin-top:3px;}
hr.divider{border:none;border-top:1.5px solid var(--border);}
.btn-submit{width:100%;background:var(--primary);color:#fff;border:none;border-radius:10px;padding:15px;font-size:1rem;font-weight:700;font-family:inherit;cursor:pointer;margin-top:28px;transition:background .15s,transform .1s;letter-spacing:-.2px;}
.btn-submit:hover{background:var(--primary-dark);}
.btn-submit:active{transform:scale(.99);}
.btn-submit:disabled{background:var(--text-hint);cursor:not-allowed;}

/* history */
.history-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);}
.history-table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.85rem;}
thead th{background:var(--bg);padding:10px 12px;text-align:left;font-size:.72rem;font-weight:700;color:var(--text-sub);letter-spacing:.5px;white-space:nowrap;border-bottom:1.5px solid var(--border);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:hover{background:var(--bg);}
tbody tr:last-child{border-bottom:none;}
tbody td{padding:12px;vertical-align:top;}
.td-num{font-size:.72rem;font-weight:700;color:var(--text-hint);text-align:right;padding-right:16px;white-space:nowrap;vertical-align:middle;}
.item-tag{display:inline-block;background:var(--primary-light);color:var(--primary);border-radius:4px;padding:1px 7px;font-size:.72rem;font-weight:600;margin:1px 2px 1px 0;white-space:nowrap;}
.item-tag.other{background:var(--warning-light);color:#92400E;}
.status-chip{display:inline-block;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;}
.status-active{background:var(--accent-light);color:var(--accent);}
.status-upcoming{background:var(--primary-light);color:var(--primary);}
.status-done{background:var(--bg);color:var(--text-hint);border:1px solid var(--border);}
.btn-delete-row{background:none;border:none;cursor:pointer;color:var(--text-hint);font-size:.95rem;padding:2px 6px;border-radius:4px;transition:color .15s;}
.btn-delete-row:hover{color:var(--danger);}
.history-empty{text-align:center;padding:40px 20px;color:var(--text-hint);font-size:.9rem;}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text-main);color:#fff;padding:13px 22px;border-radius:10px;font-size:.9rem;font-weight:500;z-index:9999;transition:transform .3s ease;pointer-events:none;white-space:nowrap;}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.success{background:var(--accent);}
#toast.error{background:var(--danger);}

@media(max-width:600px){.form-grid{grid-template-columns:1fr;}.form-grid .full{grid-column:1;}.form-card,.history-card{padding:20px 16px;}.stock-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}}
</style>
</head>
<body>

<header>
  <h1>&#128230; 물품 대여 신청</h1>
  <p>물품 카드를 클릭해 선택하고 수량을 입력한 뒤 신청서를 작성해 주세요.</p>
  <button onclick="openSettings()" style="margin-top:12px;background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.4);border-radius:8px;padding:6px 16px;font-size:.8rem;font-family:inherit;cursor:pointer;transition:background .15s;" onmouseover="this.style.background='rgba(255,255,255,.28)'" onmouseout="this.style.background='rgba(255,255,255,.18)'">&#9881;&#65039; 텔레그램 설정</button>
</header>

<!-- 설정 모달 -->
<div id="settingsOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:10000;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:32px 28px;width:min(460px,92vw);box-shadow:0 8px 40px rgba(0,0,0,.18);">
    <div style="font-size:1.05rem;font-weight:700;margin-bottom:6px;">&#9881;&#65039; 텔레그램 봇 설정</div>
    <div style="font-size:.8rem;color:#6B7280;margin-bottom:20px;line-height:1.6;">설정값은 이 기기의 브라우저에만 저장됩니다.<br>봇 토큰과 채팅 ID를 입력해 주세요.</div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <label style="font-size:.78rem;font-weight:600;color:#6B7280;display:block;margin-bottom:5px;">Bot Token</label>
        <input id="cfgToken" type="text" placeholder="7123456789:AAExxxxxxxxxxxxxxx"
          style="width:100%;font-family:monospace;font-size:.85rem;padding:9px 12px;border:1.5px solid #E2E6EB;border-radius:8px;outline:none;color:#111827;"
          onfocus="this.style.borderColor='#2563EB'" onblur="this.style.borderColor='#E2E6EB'">
      </div>
      <div>
        <label style="font-size:.78rem;font-weight:600;color:#6B7280;display:block;margin-bottom:5px;">Chat ID</label>
        <input id="cfgChatId" type="text" placeholder="-1001234567890"
          style="width:100%;font-family:monospace;font-size:.85rem;padding:9px 12px;border:1.5px solid #E2E6EB;border-radius:8px;outline:none;color:#111827;"
          onfocus="this.style.borderColor='#2563EB'" onblur="this.style.borderColor='#E2E6EB'">
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:22px;">
      <button onclick="saveSettings()" style="flex:1;background:#2563EB;color:#fff;border:none;border-radius:8px;padding:11px;font-size:.9rem;font-weight:700;font-family:inherit;cursor:pointer;">저장</button>
      <button onclick="closeSettings()" style="flex:1;background:#F7F8FA;color:#374151;border:1.5px solid #E2E6EB;border-radius:8px;padding:11px;font-size:.9rem;font-weight:600;font-family:inherit;cursor:pointer;">취소</button>
    </div>
  </div>
</div>

<div class="container">

  <p class="section-title">물품 선택 <span class="section-sub">카드를 클릭해 선택 · 수량 입력 후 신청서 작성</span></p>
  <div class="stock-grid" id="stockGrid"></div>

  <div class="selection-summary" id="selSummary">
    <span style="color:var(--text-hint);">선택된 물품이 없습니다. 위 카드를 클릭해 물품을 선택하세요.</span>
  </div>

  <div class="form-card">
    <div class="form-title">&#128221; 대여 신청서</div>
    <div class="form-grid">
      <div class="field">
        <label>담당자 이름 <span class="req">*</span></label>
        <input type="text" id="managerName" placeholder="홍길동">
      </div>
      <div class="field">
        <label>담당자 연락처 <span class="req">*</span></label>
        <input type="tel" id="managerPhone" placeholder="010-0000-0000">
      </div>
      <hr class="divider full">
      <div class="field">
        <label>대여 일시 <span class="req">*</span></label>
        <input type="datetime-local" id="rentalDate">
        <div class="date-note">대여를 시작하는 날짜와 시간</div>
      </div>
      <div class="field">
        <label>반납 일시 <span class="req">*</span></label>
        <input type="datetime-local" id="returnDate">
        <div class="date-note">반납 예정 날짜와 시간</div>
      </div>
      <div class="field full">
        <label>비고 <span style="font-size:.72rem;color:var(--text-hint);font-weight:400;">(선택)</span></label>
        <textarea id="memo" placeholder="특이사항이 있으면 작성해 주세요"></textarea>
      </div>
    </div>
    <button class="btn-submit" id="submitBtn" onclick="submitForm()">대여 신청하기</button>
  </div>

  <p class="section-title">신청 내역 <span class="section-sub" id="historyCountLabel"></span></p>
  <div class="history-card">
    <div id="historyBody">
      <div class="history-empty">아직 신청 내역이 없습니다.</div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
// ── 텔레그램 설정: localStorage에서 읽어옴 ──
function getCfg(k){ return localStorage.getItem(k) || ''; }
function setCfg(k,v){ localStorage.setItem(k,v); }
const TELEGRAM_BOT_TOKEN = getCfg('tg_token');
const TELEGRAM_CHAT_ID   = getCfg('tg_chat_id');

const ITEMS = [
  { name: '흰색 테이블보',         total: 60,  available: 60  },
  { name: '남색 테이블보',         total: 8,   available: 8   },
  { name: '테이블',               total: 60,  available: 60  },
  { name: '의자',                 total: 500, available: 500 },
  { name: '탁상용 가판대(양면)',    total: 5,   available: 5   },
  { name: '탁상용 가판대(단면)',    total: 2,   available: 2   },
  { name: '탁상용 명패 大',        total: 17,  available: 17  },
  { name: '탁상용 명패 中',        total: 46,  available: 46  },
  { name: '탁상용 명패 小',        total: 54,  available: 54  },
  { name: '슬리퍼/신발주머니',     total: 929, available: 929 },
  { name: '비표-일반끈',          total: 197, available: 197 },
  { name: '비표-파랑고급끈',      total: 112, available: 112 },
  { name: '비표-NHNE 고급끈',    total: 112, available: 112 },
  { name: '비표',                total: 544, available: 544 },
];

const selected = {};

function renderStock() {
  const grid = document.getElementById('stockGrid');
  let html = '';

  ITEMS.forEach((item, idx) => {
    const pct = item.available / item.total;
    let badge, cls;
    if (item.available === 0) { badge = '대여 불가'; cls = 'badge-out'; }
    else if (pct <= .3)       { badge = '잔여 적음';  cls = 'badge-low'; }
    else                      { badge = '대여 가능';  cls = 'badge-ok'; }
    const unavail = item.available === 0 ? 'unavailable' : '';
    const onclick = item.available === 0 ? '' : 'onclick="toggleCard(' + idx + ')"';
    html += '<div class="stock-card ' + unavail + '" id="card_' + idx + '" ' + onclick + '>' +
      '<div class="card-check" id="check_' + idx + '">&#10003;</div>' +
      '<div class="stock-name">' + item.name + '</div>' +
      '<div class="stock-count">' + item.available + '<span style="font-size:.85rem;font-weight:400;color:var(--text-sub)"> / ' + item.total + '</span></div>' +
      '<div class="stock-unit">대여 가능 / 전체</div>' +
      '<span class="badge ' + cls + '">' + badge + '</span>' +
      '<div class="card-qty-wrap" id="qwrap_' + idx + '">' +
        '<span class="card-qty-label">수량</span>' +
        '<input class="card-qty" type="number" id="qty_' + idx + '" min="1" max="' + item.available + '" value="1" onclick="event.stopPropagation()" oninput="updateQty(' + idx + ', this.value)">' +
        '<span class="card-qty-label">개</span>' +
      '</div>' +
    '</div>';
  });

  // 기타 카드
  html += '<div class="other-card">' +
    '<div class="other-card-title">&#9999;&#65039; 기타 물품</div>' +
    '<div class="other-card-sub">목록에 없는 물품 직접 입력</div>' +
    '<input type="text" id="otherNameInput" placeholder="물품명 입력" oninput="updateSummary()">' +
    '<input type="number" id="otherQtyInput" placeholder="수량" min="1" style="margin-top:2px;" oninput="updateSummary()">' +
  '</div>';

  grid.innerHTML = html;
}

function toggleCard(idx) {
  const item = ITEMS[idx];
  const card = document.getElementById('card_' + idx);
  if (selected[item.name] !== undefined) {
    delete selected[item.name];
    card.classList.remove('selected');
  } else {
    selected[item.name] = 1;
    card.classList.add('selected');
    const qEl = document.getElementById('qty_' + idx);
    if (qEl) qEl.value = 1;
  }
  updateSummary();
}

function updateQty(idx, val) {
  const item = ITEMS[idx];
  const qty = Math.max(1, Math.min(parseInt(val) || 1, item.available));
  selected[item.name] = qty;
  updateSummary();
}

function updateSummary() {
  const summaryEl = document.getElementById('selSummary');
  const chips = [];
  for (const [name, qty] of Object.entries(selected)) {
    chips.push('<span class="sel-chip">' + name + ' ' + qty + '개</span>');
  }
  const oName = (document.getElementById('otherNameInput') ? document.getElementById('otherNameInput').value : '').trim();
  const oQty  = parseInt(document.getElementById('otherQtyInput') ? document.getElementById('otherQtyInput').value : '') || 1;
  if (oName) chips.push('<span class="sel-chip" style="background:#F59E0B;">' + oName + ' ' + oQty + '개</span>');

  if (chips.length === 0) {
    summaryEl.innerHTML = '<span style="color:var(--text-hint);">선택된 물품이 없습니다. 위 카드를 클릭해 물품을 선택하세요.</span>';
  } else {
    summaryEl.innerHTML = '&#10003; 선택된 물품: ' + chips.join(' ');
  }
}

function fmtDate(val) {
  if (!val) return '-';
  return new Date(val).toLocaleString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}
function fmtDateShort(val) {
  if (!val) return '-';
  return new Date(val).toLocaleString('ko-KR', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type || '');
  setTimeout(function(){ el.className = ''; }, 3500);
}

const STORAGE_KEY = 'rental_history_v1';
function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; }
}
function saveHistory(list) { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }

function getStatus(rDate, eDate) {
  const now = Date.now();
  const r = new Date(rDate).getTime();
  const e = new Date(eDate).getTime();
  if (now < r)  return { label: '대여 예정', cls: 'status-upcoming' };
  if (now <= e) return { label: '대여 중',   cls: 'status-active' };
  return           { label: '반납 완료',     cls: 'status-done' };
}

function renderHistory() {
  const list = loadHistory();
  const bodyEl = document.getElementById('historyBody');
  const countEl = document.getElementById('historyCountLabel');
  countEl.textContent = list.length ? '총 ' + list.length + '건' : '';

  if (list.length === 0) {
    bodyEl.innerHTML = '<div class="history-empty">아직 신청 내역이 없습니다.</div>';
    return;
  }

  const sorted = list.slice().reverse();
  let rows = '';
  sorted.forEach(function(rec, sortedIdx) {
    const realIdx = list.length - 1 - sortedIdx;
    const st = getStatus(rec.rentalDate, rec.returnDate);
    const itemTags = rec.items.map(function(i) {
      return '<span class="item-tag ' + (i.isOther ? 'other' : '') + '">' + i.name + ' ' + i.qty + '개</span>';
    }).join('');
    rows += '<tr>' +
      '<td class="td-num">' + (list.length - sortedIdx) + '</td>' +
      '<td><strong>' + rec.managerName + '</strong><br><span style="font-size:.75rem;color:var(--text-hint);">' + rec.managerPhone + '</span></td>' +
      '<td style="max-width:200px;">' + itemTags + '</td>' +
      '<td style="white-space:nowrap;font-size:.8rem;"><div>' + fmtDateShort(rec.rentalDate) + '</div><div style="color:var(--text-hint);">~ ' + fmtDateShort(rec.returnDate) + '</div></td>' +
      '<td><span class="status-chip ' + st.cls + '">' + st.label + '</span></td>' +
      '<td style="font-size:.8rem;color:var(--text-sub);max-width:140px;">' + (rec.memo || '-') + '</td>' +
      '<td><button class="btn-delete-row" onclick="deleteRecord(' + realIdx + ')" title="삭제">&#128465;</button></td>' +
    '</tr>';
  });

  bodyEl.innerHTML = '<div class="history-table-wrap"><table>' +
    '<thead><tr><th>#</th><th>담당자</th><th>대여 물품</th><th>대여 / 반납 일시</th><th>상태</th><th>비고</th><th></th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table></div>';
}

function deleteRecord(idx) {
  if (!confirm('이 신청 내역을 삭제할까요?')) return;
  const list = loadHistory();
  list.splice(idx, 1);
  saveHistory(list);
  renderHistory();
  toast('내역이 삭제되었습니다.');
}

async function submitForm() {
  const name  = document.getElementById('managerName').value.trim();
  const phone = document.getElementById('managerPhone').value.trim();
  const rDate = document.getElementById('rentalDate').value;
  const eDate = document.getElementById('returnDate').value;
  const memo  = document.getElementById('memo').value.trim();

  const items = [];
  for (const key in selected) {
    if (selected.hasOwnProperty(key)) items.push({ name: key, qty: selected[key], isOther: false });
  }
  const oName = (document.getElementById('otherNameInput').value || '').trim();
  const oQty  = parseInt(document.getElementById('otherQtyInput').value) || 1;
  if (oName) items.push({ name: oName, qty: oQty, isOther: true });

  if (!name)  { toast('담당자 이름을 입력해 주세요.', 'error'); return; }
  if (!phone) { toast('담당자 연락처를 입력해 주세요.', 'error'); return; }
  if (items.length === 0) { toast('물품을 하나 이상 선택하거나 입력해 주세요.', 'error'); return; }
  if (!rDate) { toast('대여 일시를 선택해 주세요.', 'error'); return; }
  if (!eDate) { toast('반납 일시를 선택해 주세요.', 'error'); return; }
  if (new Date(eDate) <= new Date(rDate)) { toast('반납 일시는 대여 일시보다 이후여야 합니다.', 'error'); return; }

  for (let i = 0; i < items.length; i++) {
    if (items[i].isOther) continue;
    const item = ITEMS.find(function(x){ return x.name === items[i].name; });
    if (item && items[i].qty > item.available) {
      toast('"' + items[i].name + '" 재고(' + item.available + '개)를 초과했습니다.', 'error'); return;
    }
  }

  const itemLines = items.map(function(i){ return '  • ' + (i.isOther ? '[기타] ' : '') + i.name + ': ' + i.qty + '개'; }).join('\n');
  const msg = '&#128230; *물품 대여 신청*\n\n' +
    '&#128100; *담당자*: ' + name + '\n&#128222; *연락처*: ' + phone + '\n\n' +
    '&#128203; *대여 물품*\n' + itemLines + '\n\n' +
    '&#128197; *대여 일시*: ' + fmtDate(rDate) + '\n&#128260; *반납 일시*: ' + fmtDate(eDate) +
    (memo ? '\n\n&#128221; *비고*: ' + memo : '');

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '전송 중...';

  const tgToken  = getCfg('tg_token');
  const tgChatId = getCfg('tg_chat_id');
  if (!tgToken || !tgChatId) {
    openSettings();
    toast('텔레그램 설정을 먼저 입력해 주세요.', 'error');
    btn.disabled = false; btn.textContent = '대여 신청하기';
    return;
  }
  if (false) {
    // (unused branch kept for structure)
  } else {
    try {
      const res  = await fetch('https://api.telegram.org/bot' + tgToken + '/sendMessage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: tgChatId, text: msg, parse_mode: 'Markdown' })
      });
      const json = await res.json();
      if (!json.ok) throw new Error(json.description || '전송 실패');
    } catch(e) {
      console.error(e);
      toast('텔레그램 전송 오류: ' + e.message, 'error');
      btn.disabled = false; btn.textContent = '대여 신청하기';
      return;
    }
  }

  const record = { managerName: name, managerPhone: phone, items: items, rentalDate: rDate, returnDate: eDate, memo: memo, createdAt: new Date().toISOString() };
  const list = loadHistory();
  list.push(record);
  saveHistory(list);
  renderHistory();

  toast('대여 신청이 완료되었습니다!', 'success');

  // reset
  document.getElementById('managerName').value  = '';
  document.getElementById('managerPhone').value = '';
  document.getElementById('rentalDate').value   = '';
  document.getElementById('returnDate').value   = '';
  document.getElementById('memo').value         = '';
  document.getElementById('otherNameInput').value = '';
  document.getElementById('otherQtyInput').value  = '';
  for (const key in selected) { if (selected.hasOwnProperty(key)) delete selected[key]; }
  document.querySelectorAll('.stock-card.selected').forEach(function(c){ c.classList.remove('selected'); });
  updateSummary();

  btn.disabled = false;
  btn.textContent = '대여 신청하기';
}

function openSettings() {
  document.getElementById('cfgToken').value  = getCfg('tg_token');
  document.getElementById('cfgChatId').value = getCfg('tg_chat_id');
  const ov = document.getElementById('settingsOverlay');
  ov.style.display = 'flex';
}
function closeSettings() {
  document.getElementById('settingsOverlay').style.display = 'none';
}
function saveSettings() {
  const t = document.getElementById('cfgToken').value.trim();
  const c = document.getElementById('cfgChatId').value.trim();
  if (!t || !c) { alert('Bot Token과 Chat ID를 모두 입력해 주세요.'); return; }
  setCfg('tg_token', t);
  setCfg('tg_chat_id', c);
  closeSettings();
  toast('텔레그램 설정이 저장되었습니다.', 'success');
}
document.getElementById('settingsOverlay').addEventListener('click', function(e){
  if (e.target === this) closeSettings();
});

renderStock();
renderHistory();
</script>
</body>
</html>
